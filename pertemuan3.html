<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LKPD Pertemuan 3</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #f4f6f9;
}

.navbar {
  background: #1f3c88;
  color: white;
  padding: 15px 20px;
  font-weight: bold;
}

.hero {
  background: linear-gradient(to right, #8e44ad, #3498db);
  color: white;
  padding: 30px;
  text-align: center;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.section {
  margin-top: 20px;
  padding: 20px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

textarea, input {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

.table th {
  background: #8e44ad;
  color: white;
}

.table th, .table td {
  border: 1px solid #ddd;
  padding: 10px;
}

.button {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 18px;
  background: #27ae60;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

.back-btn {
  display: inline-block;
  margin-bottom: 15px;
  padding: 10px 16px;
  background: #2c3e50;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

.action-buttons {
  margin-top: 20px;
}

.save-btn {
  padding: 12px 18px;
  background: #3498db;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">📘 LKPD Komputer Grafis</div>

<div class="hero">
<h1>PERTEMUAN 3</h1>
<p>Praktik Tools & Produk Desain</p>
</div>

<div class="container">

<a href="index.html" class="back-btn">⬅ Kembali</a>

<div class="section">
<b>Identitas Siswa</b>
<input type="text" id="id_siswa" placeholder="Masukkan ID atau Nama">
</div>

<div class="section">
<h3>🛠 Praktik Tools</h3>

<table class="table">
<tr><th>Tool</th><th>Fungsi</th><th>Digunakan</th></tr>

<tr>
<td><input id="tool1"></td>
<td><input id="fungsi1"></td>
<td><input id="pakai1"></td>
</tr>

<tr>
<td><input id="tool2"></td>
<td><input id="fungsi2"></td>
<td><input id="pakai2"></td>
</tr>

</table>
</div>

<div class="section">
<h3>🎯 Penyelesaian</h3>

<input id="jenis" placeholder="Jenis desain">
<input id="tujuan" placeholder="Tujuan">
<input id="target" placeholder="Target pengguna">
</div>

<div class="section">
<h3>📤 Upload</h3>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLScE2MVOcCuNQI6hHBYxL5UDvIS_yyMBDMTEGWsiQ6f2anBxDQ/viewform?embedded=true" width="100%" height="500"></iframe>

</div>

<div class="section">
<h3>💬 Refleksi</h3>

<textarea id="ref1" placeholder="Konsep"></textarea>
<textarea id="ref2" placeholder="Tools"></textarea>
<textarea id="ref3" placeholder="Kelebihan"></textarea>
</div>

<div class="action-buttons">
<button class="save-btn" onclick="simpanData()">💾 Simpan Jawaban</button>
</div>

</div>

<script>
function simpanData() {

  const id = document.getElementById("id_siswa").value;

  if(id === ""){
    alert("Isi ID dulu!");
    return;
  }

  let jawaban = {};

  document.querySelectorAll("input, textarea").forEach(el => {
    if(el.id && el.id !== "id_siswa"){
      jawaban[el.id] = el.value;
    }
  });

  fetch("https://script.google.com/macros/s/AKfycbyOH2CYJmGS_2phOaaM48yept3J4E81T_0gOSvxgwHIlJUO3HhYkY6Q-Ektvs0gE0J9qA/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      id: id,
      pertemuan: "Pertemuan 3",
      jawaban: jawaban
    })
  })
  .then(res => res.text())
  .then(() => alert("✅ Tersimpan"))
  .catch(err => {
    console.error(err);
    alert("❌ Gagal");
  });

}
</script>

</body>
</html>
